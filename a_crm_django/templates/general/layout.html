{% load static %}
{% load django_bootstrap5 %}
<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/menu_principal.css' %}">
  <link rel="stylesheet" href="{% static 'css/add_task.css' %}">
  <link rel="stylesheet" href="{% static 'css/home.css' %}">
  <link rel="stylesheet" href="{% static 'css/client.css' %}">
  <link rel="stylesheet" href="{% static 'css/company.css' %}">
  <link rel="stylesheet" href="{% static 'css/add_opportunity.css' %}">
  <link rel="stylesheet" href="{% static 'css/pipeline.css' %}">
  <link rel="stylesheet" href="{% static 'css/add_client.css' %}">
  <link rel="stylesheet" href="{% static 'css/commercial.css' %}">



  {{ form.media.css }}
  <title>{% block title %}Título base{% endblock %}</title>
</head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<body>
  {% include "_includes/_menu_principal.html" %}

  {% block page_content %}
  {% endblock %}

  {{ form.media.js }}

  {% bootstrap_javascript %}


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {

      const toggle = document.getElementById("navToggle");
      const menu = document.getElementById("navMenu");

      toggle.addEventListener("click", function () {
        menu.classList.toggle("open");
      });

      document.querySelectorAll("#navMenu a").forEach(link => {
        link.addEventListener("click", () => {
          menu.classList.remove("open");
        });
      });

    });
  </script>

</body>

</html>
